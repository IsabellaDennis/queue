<!DOCTYPE html>
<html>
<head>
<title>Digital Queue Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#eef2ff,#f4f6fb);
}

.layout{
    display:flex;
    height:100vh;
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:250px;
    background:linear-gradient(180deg,#5a67d8,#6b46c1);
    color:white;
    display:flex;
    flex-direction:column;
    padding-top:30px;
}

.sidebar-header{
    padding:0 30px 25px 30px;
    font-size:24px;
    font-weight:700;
    letter-spacing:1px;
}

.menu-item{
    padding:14px 30px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:12px;
    font-weight:500;
    transition:0.3s;
}

.menu-item:hover{
    background:rgba(255,255,255,0.15);
}

.menu-item.active{
    background:white;
    color:#5a67d8;
    border-radius:10px;
    margin:0 15px;
    font-weight:600;
}

/* ================= MAIN ================= */
.main{
    flex:1;
    padding:50px;
    overflow-y:auto;
}

/* ================= HEADER ================= */
.page-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.main-title{
    font-size:38px;
    font-weight:700;
    color:#1f2937;   /* dark clean gray */
    letter-spacing:1px;
    margin-bottom:40px;
}

.logout-btn{
    background:#ff4d4d;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.logout-btn:hover{
    background:#e63946;
}

/* ================= CARD ================= */
.card{
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    margin-bottom:35px;
    text-align:center;
}

/* ================= STATS ================= */
.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:25px;
}

.stat-card{
    border-radius:16px;
    padding:25px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    color:white;
}

.stat-card span{
    font-size:14px;
    opacity:0.9;
}

.stat-card h3{
    margin-top:10px;
    font-size:32px;
}

/* Different color for each */
.stats-grid .stat-card:nth-child(1){
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
}
.stats-grid .stat-card:nth-child(2){
    background:linear-gradient(135deg,#0ea5e9,#38bdf8);
}
.stats-grid .stat-card:nth-child(3){
    background:linear-gradient(135deg,#f59e0b,#fbbf24);
}
.stats-grid .stat-card:nth-child(4){
    background:linear-gradient(135deg,#10b981,#34d399);
}

/* ================= ACTIONS ================= */
.actions{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    align-items:center;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
}

.generate{background:#28a745;color:white;}
.serve{background:#007bff;color:white;}
.complete{background:#ff4d4d;color:white;}
.reset{background:#6c757d;color:white;}

input,select{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

.serving{
    margin:60px auto;
    width:65%;
    max-width:850px;
    padding:70px 40px;

    background:#f3f4f6;              /* soft light grey */
    border-radius:24px;

    text-align:center;
}

.serving-label{
    font-size:22px;                  /* bigger title */
    font-weight:600;
    letter-spacing:6px;
    color:#4b5563;                   /* clean dark grey */
    margin-bottom:35px;
    margin-top:30px;
}

.serving-token{
    font-size:72px;                  /* smaller, balanced */
    font-weight:700;
    color:#e43c3c;                   /* softer purple */
    letter-spacing:14px;
    text-shadow:
        0 4px 8px rgba(0,0,0,0.25),
        0 8px 20px rgba(99,102,241,0.35),
        0 0 25px rgba(255,255,255,0.6);
}
/* ================= TABLE ================= */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    padding:12px;
    text-align:center;
}

th{
    background:#5a67d8;
    color:white;
}

tr:nth-child(even){
    background:#f5f5f5;
}

canvas{
    max-width:400px;
    margin:20px auto;
    display:block;
}

</style>
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">Admin Panel</div>

        <div class="menu-item active" onclick="showSection('dashboard',this)">
            📊 Dashboard
        </div>

        <div class="menu-item" onclick="showSection('tokens',this)">
            🎟 Tokens
        </div>

        <div class="menu-item" onclick="showSection('reports',this)">
            📈 Reports
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- HEADER -->
        <div class="page-header">
            <h1 class="page-title">🚦 Digital Queue Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboardSection">

            <div class="card">
                <div class="stats-grid">

                    <div class="stat-card">
                        <span>Total</span>
                        <h3 id="total">0</h3>
                    </div>

                    <div class="stat-card">
                        <span>Waiting</span>
                        <h3 id="waiting">0</h3>
                    </div>

                    <div class="stat-card">
                        <span>Serving</span>
                        <h3 id="serving">0</h3>
                    </div>

                    <div class="stat-card">
                        <span>Completed</span>
                        <h3 id="completed">0</h3>
                    </div>

                </div>
            </div>

            <div class="card">
                <div class="actions">
                    <button class="generate" onclick="generateToken()">Generate Token</button>
                    <button class="serve" onclick="serveNext()">Serve Next</button>
                    <button class="reset" onclick="resetQueue()">Reset</button>

                    <input type="text" id="completeToken" placeholder="Enter Token">
                    <button class="complete" onclick="completeToken()">Complete</button>
                </div>

                <div class="serving-label">CURRENTLY SERVING</div>
                <div class="serving-token" id="currentlyServing">--</div>
            </div>

        </div>

        <!-- TOKENS -->
        <div id="tokensSection" style="display:none;">
            <div class="card">
                <h2>Token History</h2>

                <div class="actions">
                    <input type="text" id="searchInput" placeholder="Search Token">
                    <select id="statusFilter">
                        <option value="">All Status</option>
                        <option value="WAITING">WAITING</option>
                        <option value="SERVING">SERVING</option>
                        <option value="COMPLETED">COMPLETED</option>
                    </select>
                </div>

                <div id="history"></div>
            </div>
        </div>

        <!-- REPORTS -->
        <div id="reportsSection" style="display:none;">
            <div class="card">
                <h2>Reports</h2>
                <canvas id="pieChart"></canvas>
                <canvas id="barChart"></canvas>
            </div>
        </div>

    </div>

</div>

<script>

let allTokens=[];
let pieChart,barChart;

function apiFetch(url){
    return fetch(url,{credentials:'include'});
}

function showSection(section,el){
    document.getElementById("dashboardSection").style.display="none";
    document.getElementById("tokensSection").style.display="none";
    document.getElementById("reportsSection").style.display="none";

    document.getElementById(section+"Section").style.display="block";

    document.querySelectorAll(".menu-item").forEach(i=>i.classList.remove("active"));
    el.classList.add("active");

    if(section==="tokens") loadHistory();
    if(section==="reports") loadCharts();
}

async function generateToken(){await apiFetch('/queue/generate');refresh();}
async function serveNext(){await apiFetch('/queue/serve');refresh();}
async function completeToken(){
    let token=document.getElementById("completeToken").value;
    if(!token) return alert("Enter token");
    await apiFetch('/queue/complete/'+token);
    document.getElementById("completeToken").value="";
    refresh();
}
async function resetQueue(){await apiFetch('/queue/reset');refresh();}
async function logout(){await fetch('/logout',{credentials:'include'});window.location="/login";}

async function loadSummary(){
    const res=await apiFetch('/queue/summary');
    const data=await res.json();
    total.innerText=data.total;
    waiting.innerText=data.waiting;
    serving.innerText=data.serving;
    completed.innerText=data.completed;
}

async function loadServing(){
    const res = await apiFetch('/queue/serving');
    const data = await res.json();

    const tokenElement = document.getElementById("currentlyServing");

    if(data && data.length > 0){
        tokenElement.innerText = data.map(t => t.tokenNumber).join(" ");
    } else {
        tokenElement.innerText = "--";
    }
}

async function loadHistory(){
    const res=await apiFetch('/queue/all');
    allTokens=await res.json();
    renderTable();
}

function renderTable(){
    let search=document.getElementById("searchInput").value.toUpperCase();
    let status=document.getElementById("statusFilter").value;
    let historyDiv=document.getElementById("history");

    let filtered=allTokens.filter(t=>{
        return t.tokenNumber.toUpperCase().includes(search) &&
               (status===""||t.status===status);
    });

    let table="<table><tr><th>Token</th><th>Status</th></tr>";
    filtered.forEach(t=>{
        table+=`<tr><td>${t.tokenNumber}</td><td>${t.status}</td></tr>`;
    });
    table+="</table>";
    historyDiv.innerHTML=table;
}

document.getElementById("searchInput").addEventListener("keyup",renderTable);
document.getElementById("statusFilter").addEventListener("change",renderTable);

async function loadCharts(){
    const res=await apiFetch('/queue/summary');
    const data=await res.json();

    if(pieChart) pieChart.destroy();
    if(barChart) barChart.destroy();

    pieChart=new Chart(document.getElementById("pieChart"),{
        type:'pie',
        data:{
            labels:['Waiting','Serving','Completed'],
            datasets:[{
                data:[data.waiting,data.serving,data.completed],
                backgroundColor:['#fbbf24','#007bff','#28a745']
            }]
        }
    });

    barChart=new Chart(document.getElementById("barChart"),{
        type:'bar',
        data:{
            labels:['Waiting','Serving','Completed'],
            datasets:[{
                data:[data.waiting,data.serving,data.completed],
                backgroundColor:'#667eea'
            }]
        }
    });
}

function refresh(){
    loadSummary();
    loadServing();
}

setInterval(refresh,3000);
refresh();

</script>

</body>
</html>
